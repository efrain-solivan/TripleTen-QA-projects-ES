[pytest]
# Local pytest config — prevents api_db_validation from inheriting
# the root pytest.ini (which requires pytest-html, not installed here).
# This file makes the suite fully self-contained for CI.

# ── Discovery ──────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ─────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short

# ── Markers ────────────────────────────────────────────────────────────────────
markers =
    smoke: Critical path tests
    full: Full regression suite
