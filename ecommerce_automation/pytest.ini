[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v -s --tb=short
filterwarnings =
    ignore::DeprecationWarning:undetected_chromedriver
markers =
    smoke: Fast sanity checks — run before every commit
    regression: Full validation suite — run in CI pipeline
