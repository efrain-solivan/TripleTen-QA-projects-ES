[pytest]
# ── Discovery ──────────────────────────────────────────────────────────────────
testpaths = selenium
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ─────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/test_report.html
    --self-contained-html

# ── Markers ────────────────────────────────────────────────────────────────────
markers =
    smoke: Critical path tests — run on every push
    full: Complete order flow regression suite
    negative: Error condition and edge case tests
    flaky: Tests that may need retries due to sandbox timing
