name: QA Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Newman — runs JSONPlaceholder Postman collection and uploads HTML report  # ─────────────────────────────────────────────────────────────────────────────
  newman-collection:
    name: Newman — JSONPlaceholder Collection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Newman and HTML reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Postman collection
        run: |
          newman run postman/jsonplaceholder_collection.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export postman/reports/newman-report.html \
            --reporter-htmlextra-title "JSONPlaceholder API — Efrain Solivan" \
            --reporter-htmlextra-logs

      - name: Upload Newman HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-html-report
          path: postman/reports/newman-report.html

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Selenium Urban Routes smoke test  # Requires the TripleTen sandbox server (URL injected via secret).
  # Skipped automatically when SELENIUM_ENABLED repo variable is not set to 'true'.
  # To enable: Settings → Variables → New repository variable → SELENIUM_ENABLED=true
  # ─────────────────────────────────────────────────────────────────────────────
  selenium-smoke:
    name: Selenium Smoke (Urban Routes)
    runs-on: ubuntu-latest
    if: ${{ vars.SELENIUM_ENABLED == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke tests
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: pytest selenium/ -m smoke -v --tb=short

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-failure-screenshots
          path: screenshots/
