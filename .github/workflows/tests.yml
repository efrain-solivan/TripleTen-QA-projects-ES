name: Urban Routes — Selenium Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:


jobs:
  selenium-tests:
    name: Run Selenium Test Suite
    runs-on: ubuntu-latest

    env:
      URBAN_ROUTES_URL: ${{ secrets.URBAN_ROUTES_URL }}
      TEST_FROM_ADDRESS: ${{ secrets.TEST_FROM_ADDRESS }}
      TEST_TO_ADDRESS: ${{ secrets.TEST_TO_ADDRESS }}
      TEST_PHONE: ${{ secrets.TEST_PHONE }}
      TEST_CARD_NUMBER: ${{ secrets.TEST_CARD_NUMBER }}
      TEST_CARD_CVV: ${{ secrets.TEST_CARD_CVV }}
      TEST_SMS_CODE: ${{ secrets.TEST_SMS_CODE }}
      TEST_DRIVER_COMMENT: ${{ secrets.TEST_DRIVER_COMMENT }}
      HEADLESS: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Create output directories
        run: |
          mkdir -p screenshots
          mkdir -p reports

      - name: Run smoke tests
        run: pytest selenium/ -m smoke --html=reports/test_report.html --self-contained-html -v

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/test_report.html

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          if-no-files-found: ignore
